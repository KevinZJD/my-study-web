<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>刷题通 - 沉浸式学习舱</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* 学生端专属：密码锁样式 */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            z-index: 9999; display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.5);
            padding: 50px 40px; border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 40px rgba(31, 38, 135, 0.1);
            text-align: center; width: 90%; max-width: 400px;
        }
        .login-box h2 { color: #1e293b; margin-bottom: 30px; }
        .login-input {
            width: 100%; padding: 15px; border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.8); background: rgba(255,255,255,0.7);
            font-size: 18px; font-weight: bold; color: #4f46e5; margin-bottom: 25px;
            text-align: center; outline: none;
        }
        .login-input:focus { border-color: #4f46e5; }
    </style>
</head>
<body class="student-portal">

    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="font-size: 28px;">🔐 解锁专属题库</h2>
            <p style="color: #64748b; margin-bottom: 20px;">请输入老师为你分配的学习暗号</p>
            <input type="text" id="student-code-input" class="login-input" placeholder="输入暗号...">
            <button id="enter-btn" class="glass-btn" style="width: 100%;">进入学习舱</button>
        </div>
    </div>

    <div id="app-content" style="display: none;">
        <nav class="glass-nav">
            <div class="nav-brand">✨ 刷题通 Pro</div>
            <div class="nav-links" id="student-welcome-text">学生专属学习舱</div>
        </nav>

        <header class="hero-section">
            <h1>进入心流状态</h1>
            <p>通透、极全、专注。请选择你的知识模块开始训练。</p>
        </header>

        <div class="container main-content">
            <div class="glass-panel control-panel">
                <div class="selector-group">
                    <div class="selector-item">
                        <span class="icon">📚 题库：</span>
                        <select id="deck-selector" class="glass-select"></select>
                    </div>
                    <div class="selector-item">
                        <span class="icon">🏷️ 考点：</span>
                        <select id="sub-deck-selector" class="glass-select"></select>
                    </div>
                </div>
                <div class="action-group">
                    <button id="quiz-btn" class="glass-btn primary-btn">🎓 进入实战测试</button>
                </div>
            </div>

            <div style="text-align: center;">
                <h2 id="current-deck-title" class="section-title" style="display: none;"></h2>
            </div>

            <div id="quiz-container" style="display: none;"></div>

            <div id="flashcard-view" style="display: none; flex-direction: column; align-items: center;">
                <div id="flashcard-progress" style="color: #1e293b; font-weight: 800; margin-bottom: 20px; font-size: 18px; background: rgba(255,255,255,0.4); padding: 5px 15px; border-radius: 20px; backdrop-filter: blur(10px);"></div>
                <div style="display: flex; align-items: center; justify-content: center; gap: 20px; width: 100%;">
                    <button id="prev-card-btn" class="glass-btn" style="padding: 15px 25px; font-size: 20px; border-radius: 50%;">◀</button>
                    <div id="flashcards-container" style="width: 100%; max-width: 650px;"></div>
                    <button id="next-card-btn" class="glass-btn" style="padding: 15px 25px; font-size: 20px; border-radius: 50%;">▶</button>
                </div>
            </div>
        </div>
        <footer><p>© 2026 刷题通 沉浸式学习平台</p></footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="student.js"></script>
</body>
</html>
